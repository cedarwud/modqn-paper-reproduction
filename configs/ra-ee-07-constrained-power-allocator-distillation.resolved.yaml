config_role: resolved-run-follow-on
inherits_from: modqn-paper-baseline.resolved-template.yaml

track:
  phase: RA-EE-07
  label: constrained-power-allocator-distillation
  method_family: RA-EE constrained fixed-association power allocation
  status: offline-replay-distillation-gate
  purpose: >
    RA-EE-07 offline fixed-association deployable power-allocator comparison.
    This is not learned association, not hierarchical RL, not joint association
    + power training, and not full RA-EE-MODQN.

baseline:
  episodes: 0

resolved_assumptions:
  hobs_power_surface:
    assumption_id: ASSUME-MODQN-REP-030
    value:
      mode: phase-03c-b-power-codebook
      inactive_beam_policy: zero-w
      power_codebook_profile: fixed-mid
      power_codebook_levels_w: [0.5, 0.75, 1.0, 1.5, 2.0]
      total_power_budget_w: 8.0
      active_base_power_w: 0.25
      load_scale_power_w: 0.35
      load_exponent: 0.5
      max_power_w: 2.0
      units: linear-w
      provenance: >
        RA-EE-07 opt-in offline replay surface. The resolved effective power
        vector feeds SINR / SNR numerator, throughput, system EE denominator,
        audit logs, and budget checks.
  ra_ee_07_constrained_power_allocator_distillation:
    assumption_id: ASSUME-MODQN-REP-030
    value:
      artifact_namespace: artifacts/ra-ee-07-constrained-power-allocator-distillation
      method_label: RA-EE constrained-power allocator distillation gate
      implementation_sublabel: RA-EE-07 constrained-power allocator distillation gate
      offline_replay_only: true
      primary_association_scope: fixed-association-only
      diagnostic_association_buckets: ra-ee-06b-proposal-buckets-diagnostic-only
      learned_association: disabled
      learned_hierarchical_RL: disabled
      association_training: disabled
      joint_association_power_training: disabled
      deployable_allocator_candidates:
        - p05-slack-aware-trim-tail-protect-boost
        - bounded-local-search-codebook
        - finite-codebook-dp-knapsack
        - deterministic-hybrid-runtime
      primary_deployable_allocator: deterministic-hybrid-runtime
      primary_control_allocator: safe-greedy-power-allocator
      fixed_control_power_w: 1.0
      codebook_levels_w: [0.5, 0.75, 1.0, 1.5, 2.0]
      total_active_power_budget_w: 8.0
      per_beam_max_power_w: 2.0
      inactive_beam_policy: zero-w
      fixed_association_buckets:
        calibration:
          role: train-like-calibration
          evaluation_seed_set: [100, 200, 300, 400, 500]
          trajectory_families:
            - hold-current
            - random-valid
            - spread-valid
        held-out:
          role: held-out-validation
          evaluation_seed_set: [600, 700, 800, 900, 1000]
          trajectory_families:
            - random-valid-heldout
            - spread-valid-heldout
            - load-skewed-heldout
            - mobility-shift-heldout
            - mixed-valid-heldout
      diagnostic_association_buckets:
        calibration:
          role: ra-ee-06b-association-proposal-diagnostic
          evaluation_seed_set: [100, 200, 300, 400, 500]
        held-out:
          role: ra-ee-06b-association-proposal-held-out-diagnostic
          evaluation_seed_set: [600, 700, 800, 900, 1000]
      diagnostic_association_policies:
        - sticky-oracle-count-local-search
        - p05-slack-aware-active-set
        - power-response-aware-load-balance
        - bounded-move-served-set
        - oracle-score-topk-active-set
      min_active_beams: 2
      max_active_beams: 8
      target_users_per_active_beam: 16
      load_cap_overflow_users: 2
      max_one_active_beam_ratio_for_acceptance: 0.25
      max_two_beam_overload_step_ratio: 0.10
      max_moved_user_ratio: 0.20
      max_moved_user_ratio_per_step: 0.18
      p05_throughput_min_ratio_vs_control: 0.95
      served_ratio_min_delta_vs_control: 0.0
      outage_ratio_max_delta_vs_control: 0.0
      candidate_max_demoted_beams: 3
      candidate_step_p05_guardrail_margin: 0.005
      p05_trim_max_moves: 6
      local_search_max_moves: 8
      dp_max_profile_count: 512
      diagnostic_max_steps: 5
      oracle_max_demoted_beams: 3
      min_oracle_gap_closed_ratio: 0.20
      diagnostic_fixed_1w: fixed-1w-control-diagnostic-only
      constrained_power_oracle_isolation: matched-fixed-association-diagnostic-only
      association_proposal_deployable_allocator: diagnostic-only
      association_oracle_constrained_power_upper_bound: diagnostic-only
      oracle_upper_bound_role: diagnostic-only
      runtime_decision_uses_oracle_labels: forbidden
      runtime_decision_uses_future_outcomes: forbidden
      runtime_decision_uses_held_out_answers: forbidden
      catfish: disabled
      multi_catfish: disabled
      rb_bandwidth_allocation: disabled
      old_ee_modqn_continuation: forbidden
      frozen_baseline_mutation: forbidden
      hobs_optimizer_claim: forbidden
      physical_energy_saving_claim: forbidden
      claim_boundary: >
        Evidence is limited to offline replay. The primary comparison is fixed
        association + safe-greedy power allocator versus fixed association +
        deployable non-oracle stronger power allocator. Fixed 1W,
        constrained-power oracle, association proposal, and association oracle
        rows are diagnostics only. Scalar reward, per-user EE credit, oracle
        labels, future outcomes, and held-out answers are not runtime decision
        inputs or success evidence.
