config_role: resolved-run-follow-on
inherits_from: modqn-paper-baseline.resolved-template.yaml

track:
  phase: hobs-active-tx-ee-qos-sticky-robustness
  label: hobs-active-tx-ee-qos-sticky-robustness-matched-control
  robustness_role: matched-control
  method_family: HOBS-Active-TX-EE-anti-collapse-robustness-gate
  status: bounded-robustness-control
  purpose: >
    Matched CONTROL arm for the bounded QoS-sticky overflow anti-collapse
    robustness / mechanism-attribution gate. Uses HOBS active-TX EE r1 and the
    same HOBS-inspired DPC sidecar as all candidate / ablation arms, with the
    anti-collapse action constraint disabled. This is not an effectiveness
    pilot.

baseline:
  episodes: 5

robustness_protocol:
  enabled: true
  seed_triplets:
    - [42, 1337, 7]
    - [43, 1338, 8]
    - [44, 1339, 9]
  evaluation_seed_set: [100, 200, 300, 400, 500]
  bounded_episode_budget: 5
  role_count: 6
  scalar_reward_diagnostic_only: true

training_experiment:
  kind: hobs-active-tx-ee-anti-collapse-design-gate
  experiment_id: HOBS-ACTIVE-TX-EE-QOS-STICKY-ROBUSTNESS-MATCHED-CONTROL
  method_family: HOBS-Active-TX-EE-anti-collapse-robustness-gate
  phase: hobs-active-tx-ee-qos-sticky-robustness
  hobs_active_tx_ee_anti_collapse:
    enabled: true
    r1_reward_mode: hobs-active-tx-ee
    r1_label: HOBS-style active-TX system EE
    r1_provenance: >
      eta_EE,active-TX = sum_u(R_u^t) /
      (sum_b z_{s,b}^t p_{s,b}^t + epsilon_P). The DPC sidecar supplies
      time-varying active-beam transmit powers. This matched control keeps the
      anti-collapse constraint disabled so candidate and ablation arms can be
      compared against the same HOBS active-TX EE / DPC boundary.
    comparison_role: matched-control
    anti_collapse_action_constraint:
      enabled: false
      mode: qos-sticky-overflow-reassignment
      max_users_per_beam: 0
      min_active_beams_target: 0
      assignment_order: user-index
      overload_threshold_users_per_beam: 50
      qos_ratio_min: 0.95
      allow_nonsticky_moves: false
      nonsticky_move_budget: 0
      provenance: >
        Disabled in control. Parameters match the primary arm only for boundary
        disclosure; disabled control behavior does not use these knobs.

resolved_assumptions:
  hobs_power_surface:
    assumption_id: ASSUME-MODQN-REP-024
    value:
      mode: hobs-dpc-sidecar
      inactive_beam_policy: zero-w
      dpc_initial_power_w: 1.0
      dpc_step_size_w: 0.1
      dpc_p_min_w: 0.1
      dpc_p_beam_max_w: 2.0
      dpc_p_sat_max_w: null
      dpc_qos_thr_bps: 0.0
      dpc_epsilon_p_w: 1.0e-9
      units: linear-w
      provenance: >
        HOBS-inspired DPC sidecar. Same parameters as every robustness role.
        Not paper-backed for MODQN. Not a HOBS optimizer reproduction.
