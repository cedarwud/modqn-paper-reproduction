config_role: resolved-run-follow-on
inherits_from: modqn-paper-baseline.resolved-template.yaml

track:
  phase: RA-EE-04
  label: bounded-power-allocator-candidate
  method_family: RA-EE-MDP
  status: bounded-pilot-candidate
  purpose: >
    RA-EE-04 fixed-association centralized power-allocation candidate. The
    allocator chooses a per-active-beam discrete power vector under hard
    budget, per-beam, inactive-beam, and QoS masks. Association is fixed by
    trajectory and is never learned jointly.

baseline:
  episodes: 20

resolved_assumptions:
  hobs_power_surface:
    assumption_id: ASSUME-MODQN-REP-027
    value:
      mode: phase-03c-b-power-codebook
      inactive_beam_policy: zero-w
      power_codebook_profile: fixed-mid
      power_codebook_levels_w: [0.5, 0.75, 1.0, 1.5, 2.0]
      total_power_budget_w: 8.0
      active_base_power_w: 0.25
      load_scale_power_w: 0.35
      load_exponent: 0.5
      max_power_w: 2.0
      units: linear-w
      provenance: >
        RA-EE-04 opt-in centralized power-allocation surface. The candidate
        resolves one effective power vector per fixed-association step; that
        same vector feeds SINR numerator, throughput, EE denominator, audit
        logs, and budget checks.
  ra_ee_04_bounded_power_allocator:
    assumption_id: ASSUME-MODQN-REP-027
    value:
      artifact_namespace: artifacts/ra-ee-04-bounded-power-allocator-candidate-pilot
      paired_control_artifact_namespace: artifacts/ra-ee-04-bounded-power-allocator-control-pilot
      comparison_artifact_namespace: artifacts/ra-ee-04-bounded-power-allocator-candidate-pilot/paired-comparison-vs-control
      method_label: RA-EE-MDP
      implementation_sublabel: RA-EE-04 fixed-association power-allocation pilot
      allocator_role: candidate
      fixed_association_only: true
      learned_association: disabled
      association_training: disabled
      power_allocator: safe-greedy-power-allocator
      power_action_contract: centralized-per-active-beam-discrete-vector
      fixed_control_power_w: 1.0
      codebook_levels_w: [0.5, 0.75, 1.0, 1.5, 2.0]
      total_active_power_budget_w: 8.0
      per_beam_max_power_w: 2.0
      inactive_beam_policy: zero-w
      primary_fixed_association_trajectories:
        - hold-current
        - random-valid
        - spread-valid
      training_episodes: 20
      train_seed: 42
      environment_seed: 1337
      mobility_seed: 7
      evaluation_seed_set: [100, 200, 300, 400, 500]
      p05_throughput_min_ratio_vs_control: 0.95
      served_ratio_min_delta_vs_control: 0.0
      outage_ratio_max_delta_vs_control: 0.0
      candidate_max_demoted_beams: 3
      oracle_max_demoted_beams: 3
      catfish: disabled
      multi_catfish: disabled
      old_ee_modqn_continuation: forbidden
      frozen_baseline_mutation: forbidden
      claim_boundary: >
        Bounded fixed-association centralized power-allocation pilot only.
        Success must be based on system EE, denominator variability, QoS
        guardrails, ranking separation, and zero power violations. Scalar
        reward and per-user EE credit are diagnostics only.
