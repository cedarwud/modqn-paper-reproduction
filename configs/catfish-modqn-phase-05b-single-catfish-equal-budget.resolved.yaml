config_role: resolved-run-follow-on
inherits_from: modqn-paper-baseline.resolved-template.yaml

track:
  phase: phase-05b
  label: catfish-modqn-phase-05b-single-catfish-equal-budget
  method_family: Catfish-MODQN
  status: bounded-pilot-comparator
  purpose: >
    Phase 05B single Catfish-MODQN equal-budget comparator. It keeps scalar
    Phase 04B high-value replay, shaping off, and total Catfish share 0.30.

baseline:
  episodes: 20
  batch_size: 64

resolved_assumptions:
  target_update_cadence:
    value:
      target_update_every_episodes: 5
  phase_05b_multi_catfish_local_assumptions:
    assumption_id: LOCAL-CATFISH-MODQN-P05B-001
    value:
      fixed_phase_05b_reward:
        r1: throughput
        r2: handover penalty
        r3: load balance
      eval_cadence_every_episodes: 5
      eval_seed_set: [100, 200, 300, 400, 500]
      bounded_run_budget_episodes: 20
      seed_triplets:
        - [42, 1337, 7]
        - [43, 1338, 8]
        - [44, 1339, 9]
      catfish_total_share: 0.30
      primary_mix_reference: "70 main + 30 scalar Catfish"
      claim_boundary:
        ee_or_catfish_ee: forbidden
        full_paper_faithful_reproduction: forbidden

training_experiment:
  kind: phase-05-b-multi-catfish-bounded-pilot
  experiment_id: P05B-SINGLE-CATFISH-EQUAL-BUDGET
  method_family: Catfish-MODQN
  phase: phase-05b
  phase_05b_multi_catfish:
    enabled: true
    variant: single-catfish-equal-budget
    ablation: single-catfish-equal-budget
    comparison_role: single-catfish-equal-budget
    r1_reward_mode: throughput
    r1_label: throughput
    r1_provenance: paper-backed original MODQN throughput objective
    seed_triplets:
      - [42, 1337, 7]
      - [43, 1338, 8]
      - [44, 1339, 9]
    reward_surface:
      r1: throughput
      r2: handover penalty
      r3: load balance
    gamma:
      main_discount_factor: 0.9
      catfish_discount_factor: 0.99
    replay:
      main_partition: baseline-complete
      partition_mode: duplicate-high-value
      catfish_capacity: 50000
      quality_score:
        expression: "quality = 0.5*r1 + 0.3*r2 + 0.2*r3"
        weights: {r1: 0.5, r2: 0.3, r3: 0.2}
      threshold:
        mode: quantile
        quantile: 0.80
        fixed_threshold: null
        window: 1000
      objective_admission:
        rule: scalar-phase04
        tie_policy: not-applicable
    warmup:
      trigger: main-replay-size
      main_replay_size: 256
    intervention:
      enabled: true
      period_updates: 1
      main_ratio: 0.70
      total_catfish_ratio: 0.30
      buffer_ratios: {r1: 0.0, r2: 0.0, r3: 0.0}
      min_catfish_replay_size: 32
    specialists:
      mode: scalar-single-catfish
    competitive_shaping:
      enabled: false
