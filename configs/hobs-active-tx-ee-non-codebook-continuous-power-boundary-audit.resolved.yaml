config_role: resolved-run-follow-on
inherits_from: modqn-paper-baseline.resolved-template.yaml

track:
  phase: hobs-active-tx-ee-non-codebook-continuous-power-implementation-readiness
  label: hobs-active-tx-ee-non-codebook-continuous-power-boundary-audit
  comparison_role: boundary-audit
  method_family: CP-base-EE-MODQN implementation-readiness
  status: deterministic-boundary-audit-driver
  purpose: >
    Deterministic boundary-audit driver for config, metadata, and rollout
    wiring proof. It does not start pilot training or claim effectiveness.
  method_markings:
    - implementation-readiness only
    - deterministic boundary audit
    - not pilot training
    - not EE-MODQN effectiveness
    - not Catfish-EE readiness
    - not HOBS optimizer reproduction

baseline:
  episodes: 5

implementation_readiness_protocol:
  enabled: true
  pilot_training_authorized: false
  boundary_audit_only: true
  scalar_reward_diagnostic_only: true
  throughput_control_config: configs/hobs-active-tx-ee-non-codebook-continuous-power-throughput-control.resolved.yaml
  ee_candidate_config: configs/hobs-active-tx-ee-non-codebook-continuous-power-ee-candidate.resolved.yaml
  output_dir: artifacts/hobs-active-tx-ee-non-codebook-continuous-power-boundary-audit

training_experiment:
  kind: hobs-active-tx-ee-non-codebook-continuous-power-implementation-readiness
  experiment_id: HOBS-ACTIVE-TX-EE-NON-CODEBOOK-CONTINUOUS-POWER-BOUNDARY-AUDIT
  method_family: CP-base-EE-MODQN implementation-readiness
  phase: hobs-active-tx-ee-non-codebook-continuous-power-implementation-readiness
  hobs_active_tx_ee_non_codebook_continuous_power:
    enabled: true
    r1_reward_mode: throughput
    r1_label: Boundary-audit driver
    r1_provenance: >
      Boundary audit driver only. It loads the throughput control and EE
      candidate configs and proves their boundary-critical metadata and
      deterministic rollout wiring. It is not a training role.
    comparison_role: boundary-audit
    anti_collapse_action_constraint:
      enabled: true
      mode: qos-sticky-overflow-reassignment
      max_users_per_beam: 0
      min_active_beams_target: 0
      assignment_order: user-index
      overload_threshold_users_per_beam: 50
      qos_ratio_min: 0.95
      allow_nonsticky_moves: false
      nonsticky_move_budget: 0
      provenance: >
        Same structural guard metadata as the future matched roles. It is not
        EE objective evidence.

resolved_assumptions:
  hobs_power_surface:
    assumption_id: ASSUME-MODQN-REP-025
    value:
      mode: non-codebook-continuous-power
      inactive_beam_policy: zero-w
      p_active_lo_w: 0.05
      p_active_hi_w: 0.25
      alpha: 0.85
      beta: 0.35
      kappa: 0.6
      bias: -2.0
      q_ref: 0.0
      n_qos: 50.0
      max_power_w: 0.25
      total_power_budget_w: 8.0
      sinr_intra_satellite_interference: false
      units: linear-w
      channel_quality_feature: log1p(unit-power-snr-linear)
      finite_codebook_levels_absent: true
      selected_power_profile_absent: true
      provenance: >
        Same analytic continuous-power constants as the future throughput
        control and EE candidate configs.
