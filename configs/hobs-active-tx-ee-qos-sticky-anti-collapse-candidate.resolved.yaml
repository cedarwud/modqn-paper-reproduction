config_role: resolved-run-follow-on
inherits_from: modqn-paper-baseline.resolved-template.yaml

track:
  phase: hobs-active-tx-ee-qos-sticky-anti-collapse
  label: hobs-active-tx-ee-qos-sticky-anti-collapse-candidate
  method_family: HOBS-Active-TX-EE-anti-collapse-gate
  status: bounded-design-gate-candidate
  purpose: >
    Matched CANDIDATE arm for the QoS- and stickiness-preserving
    anti-collapse design gate. Uses the same HOBS-style active-TX EE r1 and
    the same HOBS-inspired DPC sidecar as control, with one opt-in
    qos-sticky-overflow-reassignment constraint enabled. Same seeds,
    5-episode budget, eval schedule, and checkpoint protocol. This is not an
    effectiveness pilot.

baseline:
  episodes: 5

training_experiment:
  kind: hobs-active-tx-ee-anti-collapse-design-gate
  experiment_id: HOBS-ACTIVE-TX-EE-QOS-STICKY-ANTI-COLLAPSE-CANDIDATE
  method_family: HOBS-Active-TX-EE-anti-collapse-gate
  phase: hobs-active-tx-ee-qos-sticky-anti-collapse
  hobs_active_tx_ee_anti_collapse:
    enabled: true
    r1_reward_mode: hobs-active-tx-ee
    r1_label: HOBS-style active-TX system EE with sticky overflow anti-collapse
    r1_provenance: >
      eta_EE,active-TX = sum_u(R_u^t) /
      (sum_b z_{s,b}^t p_{s,b}^t + epsilon_P). The DPC sidecar supplies
      time-varying active-beam transmit powers. The only intended difference
      from matched control is the explicit anti-collapse constraint below.
    comparison_role: matched-candidate
    anti_collapse_action_constraint:
      enabled: true
      mode: qos-sticky-overflow-reassignment
      max_users_per_beam: 0
      min_active_beams_target: 0
      assignment_order: user-index
      overload_threshold_users_per_beam: 50
      qos_ratio_min: 0.95
      allow_nonsticky_moves: false
      nonsticky_move_budget: 0
      provenance: >
        Opt-in QoS- and stickiness-preserving overflow reassignment. During
        action selection, the normal learned greedy actions are projected into
        per-beam loads. The hook intervenes only for users beyond
        overload_threshold_users_per_beam on an overloaded source beam. The
        primary candidate only permits sticky moves back to a user's current
        beam when that beam is valid, remains under threshold after the move,
        and has estimated throughput at least 0.95 of the greedy overloaded
        source estimate. Non-sticky moves are disabled with a hard budget of
        zero. No forced min_active_beams_target is used.

resolved_assumptions:
  hobs_power_surface:
    assumption_id: ASSUME-MODQN-REP-024
    value:
      mode: hobs-dpc-sidecar
      inactive_beam_policy: zero-w
      dpc_initial_power_w: 1.0
      dpc_step_size_w: 0.1
      dpc_p_min_w: 0.1
      dpc_p_beam_max_w: 2.0
      dpc_p_sat_max_w: null
      dpc_qos_thr_bps: 0.0
      dpc_epsilon_p_w: 1.0e-9
      units: linear-w
      provenance: >
        HOBS-inspired DPC sidecar. Same parameters as control.
        Not paper-backed for MODQN. Not a HOBS optimizer reproduction.
