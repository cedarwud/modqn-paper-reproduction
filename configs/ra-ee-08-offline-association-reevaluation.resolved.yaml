config_role: resolved-run-follow-on
inherits_from: modqn-paper-baseline.resolved-template.yaml

track:
  phase: RA-EE-08
  label: offline-association-reevaluation
  method_family: RA-EE offline deterministic association re-evaluation
  status: offline-replay-association-gate
  purpose: >
    RA-EE-08 offline association proposal re-evaluation. This pairs each
    deterministic association proposal with the same deployable stronger power
    allocator used by matched fixed association. This is not training, learned
    hierarchical RL, joint association + power training, Catfish, RB/BW
    allocation, or full RA-EE-MODQN.

baseline:
  episodes: 0

resolved_assumptions:
  hobs_power_surface:
    assumption_id: ASSUME-MODQN-REP-031
    value:
      mode: phase-03c-b-power-codebook
      inactive_beam_policy: zero-w
      power_codebook_profile: fixed-mid
      power_codebook_levels_w: [0.5, 0.75, 1.0, 1.5, 2.0]
      total_power_budget_w: 8.0
      active_base_power_w: 0.25
      load_scale_power_w: 0.35
      load_exponent: 0.5
      max_power_w: 2.0
      units: linear-w
      provenance: >
        RA-EE-08 opt-in offline replay surface. The resolved effective power
        vector feeds SINR / SNR numerator, throughput, system EE denominator,
        audit logs, and budget checks for both matched fixed association and
        proposal association rows.
  ra_ee_08_offline_association_reevaluation:
    assumption_id: ASSUME-MODQN-REP-031
    value:
      artifact_namespace: artifacts/ra-ee-08-offline-association-reevaluation
      method_label: RA-EE offline association re-evaluation gate
      implementation_sublabel: RA-EE-08 offline association re-evaluation gate
      offline_replay_only: true
      deterministic_association_proposals_only: true
      learned_association: disabled
      learned_hierarchical_RL: disabled
      association_training: disabled
      joint_association_power_training: disabled
      matched_control_association_policy: fixed-hold-current
      candidate_association_policies:
        - active-set-load-spread
        - active-set-quality-spread
        - active-set-sticky-spread
        - sticky-oracle-count-local-search
        - p05-slack-aware-active-set
        - power-response-aware-load-balance
        - bounded-move-served-set
        - oracle-score-topk-active-set
      oracle_association_policies:
        - active-set-load-spread
        - active-set-quality-spread
        - active-set-sticky-spread
        - sticky-oracle-count-local-search
        - p05-slack-aware-active-set
        - power-response-aware-load-balance
        - bounded-move-served-set
        - oracle-score-topk-active-set
      predeclared_primary_association_policy: power-response-aware-load-balance
      association_action_contract: deterministic-active-set-served-set-proposal-rule
      primary_control: matched-fixed-association+deployable-stronger-power-allocator
      primary_candidate: association-proposal+same-deployable-stronger-power-allocator
      primary_power_allocator_pairing: same-deployable-stronger-power-allocator
      deployable_allocator_candidates:
        - p05-slack-aware-trim-tail-protect-boost
        - bounded-local-search-codebook
        - finite-codebook-dp-knapsack
        - deterministic-hybrid-runtime
      primary_deployable_allocator: deterministic-hybrid-runtime
      fixed_control_power_w: 1.0
      codebook_levels_w: [0.5, 0.75, 1.0, 1.5, 2.0]
      total_active_power_budget_w: 8.0
      per_beam_max_power_w: 2.0
      inactive_beam_policy: zero-w
      evaluation_buckets:
        calibration:
          role: train-like-calibration
          evaluation_seed_set: [100, 200, 300, 400, 500]
        held-out:
          role: held-out-validation
          evaluation_seed_set: [600, 700, 800, 900, 1000]
      min_active_beams: 2
      max_active_beams: 8
      target_users_per_active_beam: 16
      load_cap_overflow_users: 2
      max_one_active_beam_ratio_for_acceptance: 0.25
      max_two_beam_overload_step_ratio: 0.10
      max_moved_user_ratio: 0.20
      max_moved_user_ratio_per_step: 0.18
      p05_throughput_min_ratio_vs_control: 0.95
      served_ratio_min_delta_vs_control: 0.0
      outage_ratio_max_delta_vs_control: 0.0
      candidate_max_demoted_beams: 3
      candidate_step_p05_guardrail_margin: 0.005
      p05_trim_max_moves: 6
      local_search_max_moves: 8
      dp_max_profile_count: 512
      oracle_max_demoted_beams: 3
      min_oracle_gap_closed_ratio: 0.20
      diagnostic_rows:
        proposal_safe_greedy: association-proposal+safe-greedy-diagnostic
        fixed_safe_greedy: matched-fixed-association+safe-greedy-diagnostic
        fixed_constrained_power_oracle: matched-fixed-association+constrained-power-oracle-diagnostic
        association_oracle_constrained_power: association-oracle+constrained-power-oracle-diagnostic
        association_oracle_deployable_allocator: association-oracle+deployable-stronger-power-allocator-diagnostic
      oracle_upper_bound_role: diagnostic-only
      oracle_runtime_method: forbidden
      runtime_decision_uses_oracle_labels: forbidden
      runtime_decision_uses_future_outcomes: forbidden
      runtime_decision_uses_held_out_answers: forbidden
      catfish: disabled
      multi_catfish: disabled
      rb_bandwidth_allocation: disabled
      old_ee_modqn_continuation: forbidden
      frozen_baseline_mutation: forbidden
      hobs_optimizer_claim: forbidden
      physical_energy_saving_claim: forbidden
      claim_boundary: >
        Evidence is limited to offline deterministic proposal replay. The
        primary comparison is matched fixed association + deployable stronger
        power allocator versus proposal association + the same deployable
        stronger power allocator. Safe-greedy rows and oracle rows are
        diagnostic only. Scalar reward, per-user EE credit, oracle labels,
        future outcomes, held-out answers, and constrained oracle rows are not
        deployable runtime methods or success evidence.
