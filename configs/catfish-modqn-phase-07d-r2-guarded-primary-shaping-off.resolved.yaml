config_role: resolved-run-follow-on
inherits_from: modqn-paper-baseline.resolved-template.yaml

track:
  phase: phase-07d
  label: catfish-modqn-phase-07d-r2-guarded-primary-shaping-off
  method_family: Catfish-MODQN
  status: bounded-pilot-primary
  purpose: >
    Phase 07D r2-guarded single-Catfish primary. It keeps the original MODQN
    reward/state/action/backbone and limits the guard to Catfish replay
    admission, injection eligibility, batch composition, and handover-spike
    skip policy.

baseline:
  episodes: 20
  batch_size: 64

resolved_assumptions:
  target_update_cadence:
    value:
      target_update_every_episodes: 5
  phase_07d_r2_guarded_robustness_local_assumptions:
    assumption_id: LOCAL-CATFISH-MODQN-P07D-001
    value:
      config_defined_local_assumptions: true
      fixed_phase_07d_reward:
        r1: throughput
        r2: handover penalty
        r3: load balance
      eval_cadence_every_episodes: 5
      eval_seed_set: [100, 200, 300, 400, 500]
      bounded_run_budget_episodes: 20
      seed_triplets:
        - [42, 1337, 7]
        - [43, 1338, 8]
        - [44, 1339, 9]
      catfish_total_share: 0.30
      r2_delta_margin: -0.02
      handover_delta_margin: 5
      primary_shaping: off
      energy_efficiency_follow_on: forbidden
      phase_06: forbidden
      multi_catfish_reopening: forbidden

training_experiment:
  kind: phase-07-d-r2-guarded-single-catfish-robustness
  experiment_id: P07D-R2-GUARDED-PRIMARY-SHAPING-OFF
  method_family: Catfish-MODQN
  phase: phase-07d
  phase_07d_r2_guarded_robustness:
    enabled: true
    variant: r2-guarded-primary-shaping-off
    ablation: none
    comparison_role: r2-guarded-primary-shaping-off
    r1_reward_mode: throughput
    r1_label: throughput
    r1_provenance: paper-backed original MODQN throughput objective
    seed_triplets:
      - [42, 1337, 7]
      - [43, 1338, 8]
      - [44, 1339, 9]
    reward_surface:
      r1: throughput
      r2: handover penalty
      r3: load balance
    gamma:
      main_discount_factor: 0.9
      catfish_discount_factor: 0.99
    replay:
      main_partition: baseline-complete
      partition_mode: duplicate-high-value
      catfish_capacity: 50000
      lineage_tracking:
        enabled: true
      quality_score:
        expression: "quality = 0.5*r1 + 0.3*r2 + 0.2*r3"
        weights: {r1: 0.5, r2: 0.3, r3: 0.2}
      threshold:
        mode: quantile
        quantile: 0.80
        fixed_threshold: null
        window: 1000
    warmup:
      trigger: main-replay-size
      main_replay_size: 256
    intervention:
      enabled: true
      source_mode: catfish-replay
      period_updates: 1
      main_ratio: 0.70
      catfish_ratio: 0.30
      min_catfish_replay_size: 32
    r2_handover_guard:
      enabled: true
      admission_guard_enabled: true
      intervention_guard_enabled: true
      strict_no_handover_sample_guard: false
      max_batch_attempts: 32
      handover_spike_skip:
        enabled: true
        recent_window: 5
        min_windows: 3
        margin: 0.20
    challenger:
      enabled: true
    competitive_shaping:
      enabled: false
